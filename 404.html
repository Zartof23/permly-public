<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Permly</title>
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#4F46E5">
    <link rel="icon" href="/assets/icon.png" type="image/png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4F46E5 0%, #6366F1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 60px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4F46E5 0%, #6366F1 100%);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo svg { width: 48px; height: 48px; fill: white; }
        h1 { font-size: 5em; color: #4F46E5; margin-bottom: 8px; line-height: 1; }
        h2 { font-size: 1.4em; color: #111827; margin-bottom: 12px; }
        p { color: #6B7280; margin-bottom: 32px; }
        .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        a.btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95em;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        a.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        a.btn-primary { background: #4F46E5; color: white; }
        a.btn-secondary { background: #F3F4F6; color: #374151; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/>
            </svg>
        </div>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist. Maybe you were looking for something else?</p>
        <div class="links">
            <a href="/" class="btn btn-primary">Go Home</a>
            <a href="/support.html" class="btn btn-secondary">Support &amp; FAQ</a>
        </div>
    </div>
</body>
</html>
